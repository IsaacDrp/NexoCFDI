services:
  postgres:
    image: postgres:16-alpine
    container_name: nexocfdi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexocfdi}
      POSTGRES_USER: ${DB_USERNAME:-nexo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexo} -d ${DB_NAME:-nexocfdi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexocfdi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data:
