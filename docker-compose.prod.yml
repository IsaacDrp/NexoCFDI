services:
  postgres-prod:
    image: postgres:16-alpine
    container_name: postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexocfdi}
      POSTGRES_USER: ${DB_USERNAME:-nexo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /home/usuario/nexocfdi/prod/postgres_data:/var/lib/postgresql/data
    networks:
      - nexocfdi-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexo} -d ${DB_NAME:-nexocfdi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-prod:
    image: ghcr.io/${GITHUB_ACTOR:-isaacdrp}/nexocfdi-backend:prod
    container_name: backend-prod
    restart: unless-stopped
    depends_on:
      postgres-prod:
        condition: service_healthy
    ports:
      - "${HOST_PORT_BACKEND:-8080}:8080"
    environment:
      DB_HOST: postgres-prod
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexocfdi}
      DB_USERNAME: ${DB_USERNAME:-nexo}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
      SHOW_SQL: ${SHOW_SQL:-false}
      POLLING_INTERVAL_MINUTES: ${POLLING_INTERVAL_MINUTES:-15}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI}
      AZURE_LOGIN_CLIENT_ID: ${AZURE_LOGIN_CLIENT_ID}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-https://blob.paydibujos.com}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-nexocfdi-docs}
    networks:
      - nexocfdi-prod-net

  frontend-prod:
    image: ghcr.io/${GITHUB_ACTOR:-isaacdrp}/nexocfdi-frontend:prod
    container_name: frontend-prod
    restart: unless-stopped
    ports:
      - "${HOST_PORT_FRONTEND:-80}:80"
    environment:
      AZURE_LOGIN_CLIENT_ID: ${AZURE_LOGIN_CLIENT_ID}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-common}
      MSAL_REDIRECT_URI: ${MSAL_REDIRECT_URI:-https://nexocfdi.com}
    networks:
      - nexocfdi-prod-net

networks:
  nexocfdi-prod-net:
    name: nexocfdi-prod-net
    driver: bridge
