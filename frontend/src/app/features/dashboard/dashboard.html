<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="brand-name">NexoCFDI</span>
    </div>

    <mat-nav-list class="nav-list">
      <a
        mat-list-item
        routerLink="profile"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <mat-icon matListItemIcon>person_outline</mat-icon>
        <span matListItemTitle>Mi perfil</span>
      </a>
      <a
        mat-list-item
        routerLink="mail-accounts"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <mat-icon matListItemIcon>mail_outline</mat-icon>
        <span matListItemTitle>Cuentas de correo</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider />
      <div class="user-row">
        <div class="user-info">
          <mat-icon class="user-avatar-icon">account_circle</mat-icon>
          <div class="user-details">
            <span class="user-name">{{ userName }}</span>
            <span class="user-email">{{ userEmail }}</span>
          </div>
        </div>
        <button
          mat-icon-button
          (click)="logout()"
          matTooltip="Cerrar sesión"
          class="logout-btn"
        >
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
