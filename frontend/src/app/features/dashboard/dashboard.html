<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">

    <div class="sidenav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="var(--nx-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="brand-name">NexoCFDI</span>
    </div>

    <nav class="nav-list">
      <a routerLink="profile" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="nav-item">
        <app-icon name="user" [size]="18" />
        <span>Mi perfil</span>
      </a>
      <a routerLink="mail-accounts" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="nav-item">
        <app-icon name="mail" [size]="18" />
        <span>Cuentas de correo</span>
      </a>
      <a routerLink="ingestion" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="nav-item">
        <app-icon name="search" [size]="18" />
        <span>Búsqueda de CFDIs</span>
      </a>
    </nav>

    <div class="sidenav-footer">
      <div class="nx-divider"></div>
      <div class="user-row">
        <div class="user-info">
          <app-icon name="user-circle" [size]="32" class="user-avatar" />
          <div class="user-details">
            <span class="user-name">{{ userName }}</span>
            <span class="user-email">{{ userEmail }}</span>
          </div>
        </div>
        <button nx-btn variant="icon" (click)="logout()" title="Cerrar sesión" class="logout-btn">
          <app-icon name="log-out" [size]="16" />
        </button>
      </div>
    </div>

  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
